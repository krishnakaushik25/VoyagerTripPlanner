version: '3.8'

services:
  streamlit-app:
    build:
      context: agentic_ai/.
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - agentic_ai/.env
    environment:
      - LLAMA_API_URL=http://llama-api:8080
      - GEOCLIP_API_URL=http://geoclip-api-gpu:8090/predict
    volumes:
      - ./logs:/app/logs
    depends_on:
      - llama-api
      - geoclip-api-gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - travel-network

  geoclip-api-gpu:
    build:
      context: geoclip_api/.
      dockerfile: Dockerfile-GPU.api
    ports:
      - "8090:8090"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 
  
  llama-api:
    build:
      context: llama_fine_tuning/.
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - llama_fine_tuning/.env
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - travel-network

networks:
  travel-network:
    driver: bridge 